name: deploy-gcp

on:
  workflow_dispatch:
    inputs:
      region:
        description: "GCP region"
        required: false
        default: "us-central1"
      artifact_repository:
        description: "Artifact Registry Docker repository"
        required: false
        default: "oil-signal-mine"
  push:
    branches: ["main"]
    paths:
      - "demo/**"
      - ".github/workflows/deploy-gcp.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'oil-signal-mine' }}
  BACKEND_SERVICE: oil-signal-mine-backend
  WEB_SERVICE: oil-signal-mine-web

jobs:
  deploy:
    name: Deploy frontend and backend to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - uses: android-actions/setup-android@v3

      - name: Install stable Android debug signing key
        env:
          ANDROID_DEBUG_KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$ANDROID_DEBUG_KEYSTORE_B64" ]; then
            mkdir -p "$HOME/.android"
            echo "$ANDROID_DEBUG_KEYSTORE_B64" | base64 --decode > "$HOME/.android/debug.keystore"
            chmod 600 "$HOME/.android/debug.keystore"
          else
            echo "ANDROID_DEBUG_KEYSTORE_B64 is not configured; Android will generate an ephemeral debug key."
          fi

      - name: Build and validate shared ML data
        run: |
          python3 demo/scripts/build_demo_data.py
          python3 demo/scripts/validate_demo_data.py

      - name: Check deploy auth configuration
        run: |
          if [ -z "$GCP_PROJECT_ID" ] || [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] || [ -z "${{ vars.GCP_SERVICE_ACCOUNT }}" ]; then
            echo "Configure GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, and GCP_SERVICE_ACCOUNT repository variables."
            exit 1
          fi

      - id: auth-wif
        name: Authenticate to GCP with Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com --project "$GCP_PROJECT_ID"

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "$GAR_REPOSITORY" \
            --location "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
          || gcloud artifacts repositories create "$GAR_REPOSITORY" \
            --repository-format docker \
            --location "$GCP_REGION" \
            --description "Oil Signal Mine demo containers" \
            --project "$GCP_PROJECT_ID"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${BACKEND_SERVICE}:${GITHUB_SHA}"
          docker build -t "$BACKEND_IMAGE" demo/backend
          docker push "$BACKEND_IMAGE"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --image "$BACKEND_IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production
          BACKEND_URL="$(gcloud run services describe "$BACKEND_SERVICE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format='value(status.url)')"
          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          echo "Backend URL: $BACKEND_URL"
          echo "::notice title=Backend URL::$BACKEND_URL"

      - name: Build downloadable Android APK
        run: |
          cd demo/web
          npm ci
          export VERSION_CODE="$(date -u +%s)"
          export VERSION_NAME="1.0.${GITHUB_SHA::7}"
          VITE_API_BASE_URL="$BACKEND_URL" npm run build
          npx cap sync android
          cd android
          ./gradlew assembleDebug
          cd ..

          mkdir -p public/downloads
          APK_SOURCE="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_TARGET="public/downloads/oil-signal-mine-latest.apk"
          cp "$APK_SOURCE" "$APK_TARGET"

          APK_SIZE="$(stat -c%s "$APK_TARGET")"
          APK_SHA256="$(sha256sum "$APK_TARGET" | cut -d' ' -f1)"
          APK_BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > public/downloads/apk.json <<JSON
          {
            "available": true,
            "app_name": "Oil Direction Signal Mine",
            "artifact_name": "oil-signal-mine-latest.apk",
            "download_path": "/downloads/oil-signal-mine-latest.apk",
            "version": "debug",
            "version_code": $VERSION_CODE,
            "version_name": "$VERSION_NAME",
            "commit": "$GITHUB_SHA",
            "built_at": "$APK_BUILT_AT",
            "size_bytes": $APK_SIZE,
            "sha256": "$APK_SHA256",
            "source": "deploy-gcp",
            "note": "Debug APK built by GitHub Actions and hosted by the frontend service."
          }
          JSON

          echo "APK_DOWNLOAD_PATH=/downloads/oil-signal-mine-latest.apk" >> "$GITHUB_ENV"
          echo "APK_SIZE=$APK_SIZE" >> "$GITHUB_ENV"
          echo "APK_SHA256=$APK_SHA256" >> "$GITHUB_ENV"
          echo "APK_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "APK_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Upload deploy APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oil-signal-mine-deploy-apk
          path: demo/web/public/downloads/oil-signal-mine-latest.apk

      - name: Build and push frontend image
        run: |
          WEB_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${WEB_SERVICE}:${GITHUB_SHA}"
          docker build --build-arg VITE_API_BASE_URL="$BACKEND_URL" -t "$WEB_IMAGE" demo/web
          docker push "$WEB_IMAGE"
          echo "WEB_IMAGE=$WEB_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy frontend
        run: |
          gcloud run deploy "$WEB_SERVICE" \
            --image "$WEB_IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated
          WEB_URL="$(gcloud run services describe "$WEB_SERVICE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format='value(status.url)')"
          echo "WEB_URL=$WEB_URL" >> "$GITHUB_ENV"
          echo "Web URL: $WEB_URL"
          echo "::notice title=Frontend URL::$WEB_URL"
          echo "::notice title=APK Download URL::$WEB_URL$APK_DOWNLOAD_PATH"

      - name: Deployment summary
        run: |
          {
            echo "# Oil Signal Mine Deployment URLs"
            echo ""
            echo "| Service | URL |"
            echo "| --- | --- |"
            echo "| Frontend website | [$WEB_URL]($WEB_URL) |"
            echo "| Backend API | [$BACKEND_URL]($BACKEND_URL) |"
            echo "| Backend health | [$BACKEND_URL/health]($BACKEND_URL/health) |"
            echo "| Trading thresholds | [$BACKEND_URL/api/trading/thresholds?model=xgb]($BACKEND_URL/api/trading/thresholds?model=xgb) |"
            echo "| Android APK | [$WEB_URL$APK_DOWNLOAD_PATH]($WEB_URL$APK_DOWNLOAD_PATH) |"
            echo ""
            echo "Frontend is built with this backend API URL:"
            echo ""
            echo "\`$BACKEND_URL\`"
            echo ""
            echo "APK SHA256:"
            echo ""
            echo "\`$APK_SHA256\`"
            echo ""
            echo "APK version:"
            echo ""
            echo "\`$APK_VERSION_NAME ($APK_VERSION_CODE)\`"
          } >> "$GITHUB_STEP_SUMMARY"
