name: demo-ci

on:
  pull_request:
    paths:
      - "demo/**"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main"]
    paths:
      - "demo/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: demo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data:
    name: MLOps data contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build demo data bundle
        run: python3 demo/scripts/build_demo_data.py
      - name: Validate generated data
        run: python3 demo/scripts/validate_demo_data.py
      - name: Upload generated data manifest
        uses: actions/upload-artifact@v4
        with:
          name: demo-data-manifest
          path: |
            demo/web/public/data/demo_manifest.json
            demo/web/public/data/mlops_status.json

  backend:
    name: Backend API
    runs-on: ubuntu-latest
    needs: data
    defaults:
      run:
        working-directory: demo/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: demo/backend/package-lock.json
      - name: Rebuild shared data
        run: python3 ../scripts/build_demo_data.py
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  web:
    name: Frontend website
    runs-on: ubuntu-latest
    needs: data
    defaults:
      run:
        working-directory: demo/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: demo/web/package-lock.json
      - name: Rebuild shared data
        run: python3 ../scripts/build_demo_data.py
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser smoke tests
        run: npm run test:e2e
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: demo-web-dist
          path: demo/web/dist
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/web/playwright-report
          if-no-files-found: ignore
